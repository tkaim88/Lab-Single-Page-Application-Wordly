<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>📖 Wordly Dictionary</h1>
    <p>Search for any word to get its definition, pronunciation, and more!</p>

    <!-- Theme Toggle Button -->
    <button id="themeBtn">🌙 Dark Mode</button>

    <!-- Search Form -->
    <form id="searchForm">
      <input type="text" id="wordInput" placeholder="Enter a word (e.g., hello, happy)" required>
      <button type="submit">Search</button>
    </form>

    <!-- Loading Indicator -->
    <div id="loading" class="hidden">
      <p>Loading...</p>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="hidden">
      <p id="errorText"></p>
    </div>

    <!-- Results Area -->
    <div id="results"></div>

    <!-- Saved Words Section -->
    <div id="savedSection">
      <h2>❤️ Saved Words</h2>
      <div id="savedList"></div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
