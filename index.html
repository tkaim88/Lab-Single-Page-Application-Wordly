<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📖 Wordly Dictionary</h1>
    <p>Search for any word to get its definition, pronunciation, and more!</p>

    <!-- FIXED IDs -->
    <!-- Theme Toggle button -->
    <button id="darkModeBtn">🌙 Dark Mode</button>

    <!-- Search Form -->
    <form id="searchForm">
      <input type="text" id="wordInput" placeholder="Enter a word..." required>
      <button type="submit">Search</button>
    </form>

    <!-- Loading message -->
    <div id="loadingMessage" class="hidden">
      <p>Loading...</p>
    </div>

    <!-- Error Message Box -->
    <div id="errorBox" class="hidden">
      <p id="errorMsg"></p>
    </div>

    <div id="resultsArea"></div>

    <div id="savedSection">
      <h2>❤️ Saved Words</h2>
      <div id="savedWordsList"></div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
